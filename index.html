<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riteeshop Topup</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#000;
color:#fff;
}

header{
background:linear-gradient(90deg,#00ff88,#00ccff);
padding:15px;
text-align:center;
font-weight:bold;
font-size:18px;
}

.games{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.game{
background:#111;
border-radius:12px;
padding:10px;
text-align:center;
cursor:pointer;
transition:0.3s;
}

.game:hover{
transform:scale(1.05);
box-shadow:0 0 15px #00ff88;
}

.game img{
width:100%;
height:80px;
object-fit:cover;
border-radius:10px;
}

.page{display:none;}
.active{display:block;}

.card{
background:#111;
margin:10px;
padding:10px;
border-radius:10px;
}

.dm{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
}

.item{
background:#222;
padding:10px;
border-radius:8px;
display:flex;
justify-content:space-between;
cursor:pointer;
}

.item:hover{
background:#00ff88;
color:#000;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
}

.box{
background:#111;
padding:20px;
border-radius:10px;
text-align:center;
width:90%;
max-width:320px;
}

.qr{
width:100%;
border-radius:10px;
}

button{
margin-top:8px;
padding:10px;
width:100%;
border:none;
background:#00ff88;
border-radius:10px;
font-weight:bold;
}
</style>
</head>

<body>

<header>🔥 RITEESHOP TOPUP DISKON 🔥</header>

<!-- HOME -->
<div id="home" class="active">
<div class="games">

<script>
let games=[
"Mobile Legends","Free Fire","PUBG","Genshin Impact","Valorant",
"COD Mobile","Roblox","AOV","Clash of Clans","Clash Royale",
"Stumble Guys","Higgs Domino","Farlight","Arena Breakout","Blood Strike",
"Wild Rift","Point Blank","Dragon Raja","Undawn","Efootball"
];

games.forEach(g=>{
document.write(`
<div class="game" onclick="openGame('${g}')">
<img src="https://via.placeholder.com/150?text=${g}">
${g}
</div>`);
});
</script>

</div>
</div>

<!-- DETAIL -->
<div id="detail" class="page">
<div class="card">
<h3 id="namaGame"></h3>
<input id="userId" placeholder="Masukkan ID" style="width:100%;padding:10px">
</div>

<div class="card">
<h3>💎 Pilih Diamond</h3>
<div class="dm">

<script>
let hargaList=[500,1000,1500,2000,3000,5000,7000,10000,15000,20000,30000,50000,75000,100000];

hargaList.forEach(hargaModal=>{

let hargaJual = hargaModal + 3000; // harga kamu
let hargaCoret = hargaJual + 2000; // harga lama (lebih mahal biar diskon)
let hemat = hargaCoret - hargaJual;

let dm = hargaModal / 100;

document.write(`
<div class="item" onclick="bayar('${dm} DM','${hargaJual}')">
${dm} DM 
<span>
<small style="text-decoration:line-through;color:red">Rp ${hargaCoret}</small><br>
Rp ${hargaJual}<br>
<small style="color:yellow">Hemat Rp ${hemat}</small>
</span>
</div>`);
});
</script>

</div>
</div>

<button onclick="back()">⬅️ Kembali</button>
</div>

<!-- METODE -->
<div id="metode" class="popup">
<div class="box">
<h3>Pilih Pembayaran</h3>
<button onclick="qr()">QRIS</button>
<button onclick="dana()">DANA</button>
<button onclick="tutup()">Batal</button>
</div>
</div>

<!-- QR -->
<div id="qrpopup" class="popup">
<div class="box">
<h3>Scan QR</h3>
<img src="qris.jpg" class="qr">
<p id="ket"></p>

<button onclick="kirimWA('6285809805463')">Kirim ke Admin 1</button>
<button onclick="kirimWA('6285147811090')">Kirim ke Admin 2</button>
<button onclick="tutup()">Tutup</button>
</div>
</div>

<!-- DANA -->
<div id="danapopup" class="popup">
<div class="box">
<h3>DANA</h3>
<p style="font-size:20px">085758341770</p>
<p id="ket2"></p>

<button onclick="kirimWA('6285809805463')">Kirim ke Admin 1</button>
<button onclick="kirimWA('6285147811090')">Kirim ke Admin 2</button>
<button onclick="tutup()">Tutup</button>
</div>
</div>

<script>
let game="",dm="",harga="",metodeDipilih="";

function openGame(n){
game=n;
namaGame.innerText=n;
home.classList.remove("active");
detail.classList.add("active");
}

function back(){
detail.classList.remove("active");
home.classList.add("active");
}

function bayar(d,h){
dm=d;
harga=h;
metode.style.display="flex";
}

function qr(){
metodeDipilih="QRIS";
metode.style.display="none";
qrpopup.style.display="flex";
ket.innerText=game+" | "+dm+" | Rp "+harga;
}

function dana(){
metodeDipilih="DANA";
metode.style.display="none";
danapopup.style.display="flex";
ket2.innerText=game+" | "+dm+" | Rp "+harga;
}

function kirimWA(no){
let id=document.getElementById("userId").value;

if(!id){
alert("Isi ID dulu!");
return;
}

let pesan=`🔥 ORDER TOPUP 🔥
Game: ${game}
ID: ${id}
Item: ${dm}
Harga: Rp ${harga}
Metode: ${metodeDipilih}

Kirim bukti pembayaran ya`;

window.open("https://wa.me/"+no+"?text="+encodeURIComponent(pesan));
}

function tutup(){
metode.style.display="none";
qrpopup.style.display="none";
danapopup.style.display="none";
}
</script>

</body>
</html>
